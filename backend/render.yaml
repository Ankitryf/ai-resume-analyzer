services:
  - type: web
    name: ai-resume-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python -m spacy download en_core_web_sm"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-resume-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: "production"
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        sync: false
      - key: AUTH_RATE_LIMIT
        value: "10"
      - key: ANALYSIS_RATE_LIMIT
        value: "5"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"

databases:
  - name: ai-resume-db
    plan: free
    databaseName: ai_resume_analyzer
    region: oregon
